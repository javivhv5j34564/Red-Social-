server.port=8080
spring.application.name=api-gateway

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Actuator
management.endpoints.web.exposure.include=*

# ============================
# RUTAS DEL API GATEWAY
# ============================

# Usuarios
spring.cloud.gateway.routes[0].id=usuario-ms
spring.cloud.gateway.routes[0].uri=lb://USUARIO-MS
spring.cloud.gateway.routes[0].predicates[0]=Path=/usuarios/**

# Feed
spring.cloud.gateway.routes[1].id=feed-ms
spring.cloud.gateway.routes[1].uri=lb://FEED-MS
spring.cloud.gateway.routes[1].predicates[0]=Path=/feed/**

# Contenido
spring.cloud.gateway.routes[2].id=contenido-ms
spring.cloud.gateway.routes[2].uri=lb://CONTENIDO-MS
spring.cloud.gateway.routes[2].predicates[0]=Path=/contenidos/**
