# ==============================================================
# CONFIGURACIÓN DEL SERVIDOR
# ==============================================================
server.port=8082

# ==============================================================
# BASE DE DATOS H2 (MEMORIA VOLÁTIL)
# ==============================================================
spring.datasource.url=jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==============================================================
# CONFIGURACIÓN DE RABBITMQ (ACTIVA EL LISTENER)
# ==============================================================
# ESTA ES LA LÍNEA MÁS IMPORTANTE PARA QUE TU FEEDLISTENER FUNCIONE
app.rabbitmq.enabled=true

# Datos de conexión al servidor local
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Configuración del Listener para evitar errores en el arranque
spring.rabbitmq.listener.simple.missing-queues-fatal=false
spring.rabbitmq.listener.simple.auto-startup=true
spring.rabbitmq.listener.simple.retry.enabled=false